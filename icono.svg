<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Degradado vibrante -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3B30" />
      <stop offset="100%" stop-color="#FF9500" />
    </linearGradient>
    
    <!-- Sombra suave para que el corazón no se "corte" visualmente -->
    <filter id="dropShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="8" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <linearGradient id="glass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.4" />
      <stop offset="50%" stop-color="white" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Fondo del icono -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)" />
  <rect width="512" height="256" rx="110" fill="url(#glass)" />

  <!-- Corazón re-escalado y centrado (subido un poco para que no toque el borde) -->
  <path d="M256 385l-18-17C160 300 108 255 108 195c0-45 35-80 80-80 26 0 50 12 68 32 18-20 42-32 68-32 45 0 80 35 80 80 0 60-52 105-130 173l-18 17z" 
        fill="white" filter="url(#dropShadow)" />

  <!-- Línea de pulso centrada sobre el corazón -->
  <path d="M165 205h30l12-35 22 75 20-60 12 20h35" 
        stroke="#FF3B30" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
</svg>
