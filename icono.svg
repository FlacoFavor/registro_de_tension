<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">

  <rect width="512" height="512" rx="120" fill="url(#grad)" />
  

  <path d="M256 390l-22-20C156 300 100 250 100 186c0-52 40-92 92-92 30 0 58 14 76 36 18-22 46-36 76-36 52 0 92 40 92 92 0 64-56 114-134 184l-22 20z" fill="black" fill-opacity="0.1"/>
  

  <path d="M256 380l-20-18C158 295 106 248 106 188c0-48 38-86 86-86 28 0 55 13 72 34 17-21 44-34 72-34 48 0 86 38 86 86 0 60-52 107-130 174l-20 18z" fill="white"/>
  

  <path d="M160 200h30l15-40 25 80 20-60 15 20h40" stroke="#e74c3c" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ef4444"/>
      <stop offset="1" stop-color="#e74c3c"/>
    </linearGradient>
  </defs>

  <defs>
  
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff5f6d" />
      <stop offset="100%" stop-color="#ffc371" />
    </linearGradient>
    
  
    <linearGradient id="glass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.4" />
      <stop offset="50%" stop-color="white" stop-opacity="0" />
    </linearGradient>


    <filter id="softShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="10" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>


  <rect width="512" height="512" rx="120" fill="url(#mainGrad)" />
  
  
  <rect width="512" height="256" rx="120" fill="url(#glass)" />


  <path d="M256 400l-20-18C158 315 106 268 106 208c0-48 38-86 86-86 28 0 55 13 72 34 17-21 44-34 72-34 48 0 86 38 86 86 0 60-52 107-130 174l-20 18z" 
        fill="white" filter="url(#softShadow)" />


  <path d="M160 220h35l12-35 20 75 22-60 12 20h35" 
        stroke="#ff5f6d" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
</svg>
